name: Deploy to Cloudflare Workers

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Never run two deploys at once; cancel superseded PR builds
concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && github.event.pull_request.number || 'main' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: next-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: next-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (OpenNext for Cloudflare)
        run: npx opennextjs-cloudflare build
        env:
          COMMIT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      # PRs: upload a preview version (own shareable URL, production untouched)
      - name: Upload preview version (PR)
        if: github.event_name == 'pull_request'
        run: |
          npx opennextjs-cloudflare upload -- --message "PR #${{ github.event.pull_request.number }}" | tee upload.log
          {
            echo "## Cloudflare preview"
            grep -Eo 'https://[a-z0-9-]+\.[a-z0-9-]+\.workers\.dev[^ ]*' upload.log | head -1 \
              || echo "Preview uploaded — URL in the step log above."
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # main: deploy to production
      - name: Deploy to production (main)
        if: github.event_name == 'push'
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test production
        if: github.event_name == 'push'
        env:
          SITE_URL: https://dbrandao.com
        run: |
          for path in / /articles /projects; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --retry 10 --retry-delay 10 --retry-all-errors "${SITE_URL}${path}")
            if [ "$code" = "200" ]; then
              echo "OK   ${path} (HTTP ${code})"
            else
              echo "FAIL ${path} (HTTP ${code})"
              exit 1
            fi
          done
