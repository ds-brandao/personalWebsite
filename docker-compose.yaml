services:
  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./next-app:/app
      - next_node_modules:/app/node_modules
      - next_cache:/app/.next
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    # Optional: create next-app/.env.local with OPENAI_API_KEY for AI project analyses
    env_file:
      - path: ./next-app/.env.local
        required: false
    environment:
      - NODE_ENV=development

  web:
    build: .
    ports:
      - "80:3000"
    env_file:
      - path: ./next-app/.env.local
        required: false
    profiles:
      - production

volumes:
  next_node_modules:
  next_cache:
