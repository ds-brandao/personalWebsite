services:
  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./next-app:/app
      - next_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    environment:
      - NODE_ENV=development
      - OPENAI_API_KEY=${OPENAI_API_KEY}

  web:
    build: .
    ports:
      - "80:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    profiles:
      - production

volumes:
  next_node_modules:
